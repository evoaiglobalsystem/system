<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<link rel="icon" type="image/x-icon" href="https://evoaiglobal.ai/images/favicon.ico">
<title>evoAI — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
  import { getAuth, signInWithPopup, GoogleAuthProvider, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyC4k4kJZ2aDrYs7Ah-H0SuMF-d8s55X9ZM",
    authDomain: "evoai-authentication.firebaseapp.com",
    projectId: "evoai-authentication",
    storageBucket: "evoai-authentication.firebasestorage.app",
    messagingSenderId: "77079760801",
    appId: "1:77079760801:web:2bbfeffffc38a6265c45e0"
  };

  const app      = initializeApp(firebaseConfig);
  const auth     = getAuth(app);
  const provider = new GoogleAuthProvider();
  await setPersistence(auth, browserLocalPersistence);

  window.googleLogin = async () => {
    const btn = document.getElementById('googleBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="btn-spinner"></span> Opening Google…';
    clearError();
    try {
      const result = await signInWithPopup(auth, provider);
      if (result?.user) window.location.href = "/system/evoai-leads.html";
    } catch (err) {
      btn.disabled = false;
      btn.innerHTML = googleBtnInner;
      if (err.code !== 'auth/popup-closed-by-user' && err.code !== 'auth/cancelled-popup-request') {
        showError(friendlyError(err.code));
      }
      console.error(err);
    }
  };

  function friendlyError(code) {
    const map = {
      'auth/popup-blocked':          'Popup was blocked — please allow popups for this site and try again.',
      'auth/user-disabled':          'This Google account has been disabled.',
      'auth/too-many-requests':      'Too many attempts. Please try again later.',
      'auth/network-request-failed': 'Network error. Check your connection and try again.',
      'auth/unauthorized-domain':    'This domain is not authorised in Firebase. Contact the admin.',
      'auth/internal-error':         'An internal error occurred. Please try again.',
    };
    return map[code] || 'Something went wrong. Please try again.';
  }

  function clearError() { document.getElementById('errorMsg').style.display = 'none'; }
  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.querySelector('span').textContent = msg;
    el.style.display = 'flex';
  }
</script>

<style>
  :root {
    --bg:      #080d18;
    --surface: #0e1420;
    --surface2:#141c2a;
    --border:  #1e2d42;
    --accent:  #00e5a0;
    --danger:  #ff4d6d;
    --text:    #e8f0fe;
    --muted:   #6b7fa3;
    --font:    'Sora', sans-serif;
    --mono:    'DM Mono', monospace;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg); color: var(--text); font-family: var(--font);
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center; overflow: hidden; position: relative;
  }

  body::before {
    content: ''; position: fixed; inset: 0; z-index: 0;
    background-image:
      linear-gradient(rgba(0,229,160,.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,160,.04) 1px, transparent 1px);
    background-size: 44px 44px;
    mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 40%, transparent 100%);
    pointer-events: none;
  }

  .orb { position: fixed; border-radius: 50%; filter: blur(90px); pointer-events: none; z-index: 0; animation: drift 12s ease-in-out infinite alternate; }
  .orb-1 { width: 420px; height: 420px; background: radial-gradient(circle, rgba(0,229,160,.13), transparent 70%); top: -120px; left: -80px; }
  .orb-2 { width: 360px; height: 360px; background: radial-gradient(circle, rgba(0,184,255,.10), transparent 70%); bottom: -100px; right: -80px; animation-delay: -6s; }
  @keyframes drift { from { transform: translate(0,0) scale(1); } to { transform: translate(30px,20px) scale(1.06); } }

  .card {
    position: relative; z-index: 1;
    background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
    padding: 52px 44px 44px; width: 100%; max-width: 420px;
    box-shadow: 0 32px 80px rgba(0,0,0,.55), 0 0 0 1px rgba(0,229,160,.05);
    animation: cardIn .4s cubic-bezier(.22,1,.36,1); text-align: center;
    margin-bottom: 80px;
  }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(28px) scale(.98); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .logo-wrap { display: flex; flex-direction: column; align-items: center; gap: 12px; margin-bottom: 36px; }
  .logo-wrap img { height: 56px; width: auto; }
  .logo-badge {
    font-family: var(--mono); font-size: .68rem; letter-spacing: .12em;
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--muted); padding: 4px 12px; border-radius: 4px; text-transform: uppercase;
  }

  .card-title { font-size: 1.6rem; font-weight: 700; letter-spacing: -.02em; margin-bottom: 10px; }
  .card-sub   { font-size: .9rem; color: var(--muted); margin-bottom: 36px; line-height: 1.6; }
  .divider    { height: 1px; background: var(--border); margin: 0 -44px 36px; }

  .msg {
    display: none; align-items: flex-start; gap: 10px;
    padding: 12px 14px; border-radius: 8px;
    font-size: .84rem; margin-bottom: 20px; line-height: 1.45; text-align: left;
  }
  .msg svg { flex-shrink: 0; margin-top: 1px; }
  .msg-error { background: rgba(255,77,109,.08); border: 1px solid rgba(255,77,109,.2); color: #ff8099; }

  .google-btn {
    width: 100%; padding: 15px 20px;
    background: #fff; color: #3c4043;
    font-family: var(--font); font-size: .95rem; font-weight: 600;
    border: 1px solid #dadce0; border-radius: 8px; cursor: pointer; transition: all .18s;
    display: flex; align-items: center; justify-content: center; gap: 12px;
    box-shadow: 0 1px 3px rgba(0,0,0,.12);
  }
  .google-btn:hover:not(:disabled) { background: #f8f9fa; box-shadow: 0 4px 16px rgba(0,0,0,.18); transform: translateY(-1px); }
  .google-btn:active:not(:disabled) { transform: translateY(0); }
  .google-btn:disabled { opacity: .7; cursor: not-allowed; }

  .btn-spinner {
    display: inline-block; width: 15px; height: 15px;
    border: 2px solid rgba(60,64,67,.2); border-top-color: #3c4043;
    border-radius: 50%; animation: spin .6s linear infinite; flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .secure-note {
    display: flex; align-items: center; justify-content: center; gap: 6px;
    margin-top: 18px; font-size: .74rem; color: var(--muted); font-family: var(--mono); opacity: .7;
  }

  /* ── FOOTER matching evoaiglobal.ai ── */
  .site-footer {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 10;
    background: #0b1020;
    border-top: 1px solid #1a2540;
    padding: 14px 40px;
  }

  .footer-top {
    display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px;
  }

  .footer-logo img { height: 26px; width: auto; }

  .footer-social { display: flex; align-items: center; gap: 8px; }
  .social-icon {
    width: 30px; height: 30px; border-radius: 6px;
    border: 1px solid #1e2d42;
    display: flex; align-items: center; justify-content: center;
    color: var(--accent); text-decoration: none; transition: all .18s;
    background: #0e1420;
  }
  .social-icon:hover { border-color: var(--accent); background: rgba(0,229,160,.08); }
  .social-icon svg { width: 13px; height: 13px; }

  .footer-middle {
    text-align: center; margin-bottom: 8px;
    font-size: .72rem; color: var(--muted);
  }
  .footer-middle .evoai-link {
    background: linear-gradient(90deg, #00e5a0, #00b8ff);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text; font-weight: 700; text-decoration: none;
  }

  .footer-bottom {
    display: flex; align-items: center; justify-content: space-between;
  }

  .footer-tagline {
    font-size: .7rem; color: var(--muted); letter-spacing: .01em;
  }

  .footer-links {
    display: flex; align-items: center; gap: 6px; font-size: .68rem; color: var(--muted);
  }
  .footer-links a { color: var(--muted); text-decoration: none; transition: color .15s; }
  .footer-links a:hover { color: var(--accent); }
  .footer-links span { opacity: .4; }

  @media (max-width: 480px) {
    .card { padding: 40px 28px 32px; margin: 16px; margin-bottom: 90px; }
    .divider { margin: 0 -28px 32px; }
    .site-footer { padding: 12px 20px; }
  }
</style>
</head>
<body>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<div class="card">
  <div class="logo-wrap">
    <img src="https://www.evoaiglobal.ai/images/logo.png" alt="evoAI"/>
    <span class="logo-badge">Lead Manager</span>
  </div>

  <div class="card-title">Welcome</div>
  <div class="card-sub">Management Dashboard</div>

  <div class="divider"></div>

  <div class="msg msg-error" id="errorMsg">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    <span></span>
  </div>

  <button class="google-btn" id="googleBtn" onclick="googleLogin()">
    <svg width="20" height="20" viewBox="0 0 48 48" style="flex-shrink:0">
      <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
      <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
      <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
      <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
    </svg>
    Sign in with Google
  </button>

  <div class="secure-note">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
    Secured by Google OAuth 2.0
  </div>
</div>

<!-- ── Footer matching evoaiglobal.ai ── -->
<footer class="site-footer">
  <div class="footer-top">
    <a href="https://evoaiglobal.ai" target="_blank" class="footer-logo">
      <img src="https://www.evoaiglobal.ai/images/logo.png" alt="evoAI"/>
    </a>
    <div class="footer-social">
      <!-- LinkedIn -->
      <a onclick="return false;" href="https://linkedin.com/company/evoaiglobal" target="_blank" class="social-icon" aria-label="LinkedIn">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
      </a>
      <!-- Facebook -->
      <a onclick="return false;" href="https://facebook.com/evoaiglobal" target="_blank" class="social-icon" aria-label="Facebook">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
      </a>
      <!-- X / Twitter -->
      <a onclick="return false;" href="https://x.com/evoaiglobal" target="_blank" class="social-icon" aria-label="X">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.748l7.73-8.835L1.254 2.25H8.08l4.259 5.631 5.905-5.631zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
      </a>
    </div>
  </div>
  <div class="footer-middle">
    Powered by <a href="https://evoaiglobal.ai/#services" target="_blank" class="evoai-link">evoAI</a>
  </div>
  <div class="footer-bottom">
    <span class="footer-tagline">Evolve. Automate. Accelerate.</span>
    <div class="footer-links">
      <a href="https://evoaiglobal.ai" target="_blank">evoaiglobal.ai</a>
      <span>·</span>
      <a href="https://evoaiglobal.ai/privacy-policy" target="_blank">Privacy</a>
      <span>·</span>
      <a href="https://evoaiglobal.ai/terms" target="_blank">Terms</a>
    </div>
  </div>
</footer>

<script>
  const googleBtnInner = document.getElementById('googleBtn').innerHTML;
</script>

</body>
</html>
